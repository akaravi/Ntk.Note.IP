# Optional overlay: enable Redis distributed cache (use with -f docker-compose.prod.yml -f docker-compose.prod.redis.yml)
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3

  web:
    environment:
      ConnectionStrings__redis: redis:6379
    depends_on:
      redis:
        condition: service_started
