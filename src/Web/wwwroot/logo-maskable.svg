<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IPNote.ir logo">
  <title>IPNote.ir</title>
  <defs>
    <linearGradient id="ipnote-bg-m" x1="40" y1="-40" x2="472" y2="552" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.45" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#1e1b3a"/>
    </linearGradient>
    <linearGradient id="ipnote-text-m" x1="170" y1="200" x2="330" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="ipnote-shadow-m" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1e1b3a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Full-bleed gradient for maskable safe area -->
  <rect x="0" y="0" width="512" height="512" fill="url(#ipnote-bg-m)"/>

  <!-- Note sheet with folded top-right corner (kept in central safe zone) -->
  <g filter="url(#ipnote-shadow-m)">
    <path d="M148 148 H316 L380 212 V366 Q380 384 362 384 H148 Q130 384 130 366 V166 Q130 148 148 148 Z" fill="#ffffff"/>
    <path d="M316 148 L380 212 H332 Q316 212 316 196 Z" fill="#d6cdf3"/>
  </g>

  <text x="255" y="290" text-anchor="middle" font-family="'Outfit','Segoe UI',Arial,sans-serif" font-size="138" font-weight="800" letter-spacing="-4" fill="url(#ipnote-text-m)">IP</text>

  <rect x="166" y="318" width="178" height="16" rx="8" fill="#ddd6fe"/>
  <rect x="166" y="346" width="128" height="16" rx="8" fill="#ddd6fe"/>
</svg>
