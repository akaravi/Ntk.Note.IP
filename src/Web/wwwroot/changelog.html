<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تغییرات — IPNote.ir</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
      }
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1rem;
    }
    .wrap { max-width: 42rem; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    #content {
      white-space: pre-wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>تغییرات IPNote.ir</h1>
    <p class="sub">Changelog — from CHANGELOG.md</p>
    <article id="content">در حال بارگذاری…</article>
    <p class="sub"><a href="/">بازگشت به IPNote.ir</a> · <a href="/status.html">وضعیت سرویس</a></p>
  </div>
  <script>
    fetch('/CHANGELOG.md', { cache: 'no-store' })
      .then(r => { if (!r.ok) throw new Error(String(r.status)); return r.text(); })
      .then(md => { document.getElementById('content').textContent = md; })
      .catch(() => { document.getElementById('content').textContent = 'Could not load CHANGELOG.md.'; });
  </script>
</body>
</html>
