<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>وضعیت سرویس — IPNote.ir</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --ok: #15803d;
      --ok-bg: #dcfce7;
      --bad: #b91c1c;
      --bad-bg: #fee2e2;
      --pending: #a16207;
      --pending-bg: #fef9c3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
        --ok: #4ade80;
        --ok-bg: #14532d;
        --bad: #fca5a5;
        --bad-bg: #7f1d1d;
        --pending: #facc15;
        --pending-bg: #713f12;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 2rem 1rem;
    }
    .wrap { max-width: 40rem; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .overall {
      padding: 1rem 1.25rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .overall--ok { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); }
    .overall--bad { border-color: var(--bad); background: var(--bad-bg); color: var(--bad); }
    .overall--pending { border-color: var(--pending); background: var(--pending-bg); color: var(--pending); }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      background: var(--surface);
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge--ok { background: var(--ok-bg); color: var(--ok); }
    .badge--bad { background: var(--bad-bg); color: var(--bad); }
    .badge--pending { background: var(--pending-bg); color: var(--pending); }
    footer { margin-top: 2rem; font-size: 0.8rem; color: var(--muted); }
    footer a { color: var(--muted); }
    [dir="ltr"] .mono { font-family: ui-monospace, monospace; font-size: 0.85rem; }
    .mono { direction: ltr; text-align: left; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>وضعیت سرویس IPNote.ir</h1>
    <p class="sub">Service status — auto-refresh every 60s</p>
    <div id="overall" class="overall overall--pending">در حال بررسی…</div>
    <ul id="checks"></ul>
    <footer>
      <span id="updated"></span>
      · <a href="/">بازگشت به IPNote.ir</a>
    </footer>
  </div>
  <script>
    const probes = [
      { id: 'health', path: '/health', label: 'Health' },
      { id: 'alive', path: '/alive', label: 'Liveness' },
      { id: 'ready', path: '/health/ready', label: 'Readiness' },
      { id: 'api', path: '/api/v1/IpLookup/GetMyIp', label: 'API (GetMyIp)' }
    ];

    async function probeOne(base, item) {
      const url = base + item.path;
      try {
        const res = await fetch(url, { cache: 'no-store' });
        return { ...item, ok: res.ok, status: res.status };
      } catch (e) {
        return { ...item, ok: false, status: 'error' };
      }
    }

    async function run() {
      const base = window.location.origin;
      const results = await Promise.all(probes.map(p => probeOne(base, p)));
      const list = document.getElementById('checks');
      list.innerHTML = '';
      let allOk = true;
      for (const r of results) {
        if (!r.ok) allOk = false;
        const li = document.createElement('li');
        const badge = r.ok ? 'badge--ok' : 'badge--bad';
        const text = r.ok ? 'Operational' : 'Issue';
        li.innerHTML = '<span>' + r.label + '<br><span class="mono">' + r.path + '</span></span>'
          + '<span class="badge ' + badge + '">' + text + ' (' + r.status + ')</span>';
        list.appendChild(li);
      }
      const overall = document.getElementById('overall');
      overall.className = 'overall ' + (allOk ? 'overall--ok' : 'overall--bad');
      overall.textContent = allOk
        ? 'همه سرویس‌ها در دسترس هستند — All systems operational'
        : 'اختلال در یک یا چند سرویس — Service disruption';
      document.getElementById('updated').textContent =
        'Last check: ' + new Date().toLocaleString('fa-IR');
    }

    run();
    setInterval(run, 60000);
  </script>
</body>
</html>
