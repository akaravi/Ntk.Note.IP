<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IPNote.ir logo">
  <title>IPNote.ir</title>
  <defs>
    <linearGradient id="ipnote-bg" x1="96" y1="40" x2="416" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.45" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#1e1b3a"/>
    </linearGradient>
    <linearGradient id="ipnote-text" x1="150" y1="170" x2="330" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="ipnote-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1e1b3a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Brand background: violet gradient rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#ipnote-bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="none" stroke="#c4b5fd" stroke-opacity="0.45" stroke-width="6"/>

  <!-- Note sheet with folded top-right corner -->
  <g filter="url(#ipnote-shadow)">
    <path d="M130 130 H316 L398 212 V382 Q398 402 378 402 H130 Q110 402 110 382 V150 Q110 130 130 130 Z" fill="#ffffff"/>
    <!-- Folded corner (dog-ear) -->
    <path d="M316 130 L398 212 H336 Q316 212 316 192 Z" fill="#d6cdf3"/>
  </g>

  <!-- IP wordmark on the note -->
  <text x="248" y="288" text-anchor="middle" font-family="'Outfit','Segoe UI',Arial,sans-serif" font-size="150" font-weight="800" letter-spacing="-4" fill="url(#ipnote-text)">IP</text>

  <!-- Note lines (text/note hint) -->
  <rect x="150" y="320" width="208" height="18" rx="9" fill="#ddd6fe"/>
  <rect x="150" y="352" width="150" height="18" rx="9" fill="#ddd6fe"/>
</svg>
