<article [attr.dir]="i18n.direction()" [attr.lang]="i18n.locale()">
  <h2>{{ i18n.t('AUTH.LOGIN') }}</h2>
  <form (ngSubmit)="login()" #loginForm="ngForm">
    <label for="email">{{ i18n.t('AUTH.EMAIL') }}</label>
    <input type="email" id="email" name="email" [(ngModel)]="email"
      [attr.aria-invalid]="invalid ? true : null"
      aria-describedby="login-error"
      autocomplete="username"
      (ngModelChange)="invalid = false" />
    <label for="password">{{ i18n.t('AUTH.PASSWORD') }}</label>
    <input type="password" id="password" name="password" [(ngModel)]="password"
      [attr.aria-invalid]="invalid ? true : null"
      aria-describedby="login-error"
      autocomplete="current-password"
      (ngModelChange)="invalid = false" />
    @if (invalid) {
      <small id="login-error">{{ i18n.t('AUTH.LOGIN_INVALID') }}</small>
    }
    <button type="submit">{{ i18n.t('AUTH.LOGIN') }}</button>
    <p class="auth-switch">{{ i18n.t('AUTH.NO_ACCOUNT') }} <a [routerLink]="['/register']">{{ i18n.t('AUTH.REGISTER') }}</a></p>
  </form>
</article>
