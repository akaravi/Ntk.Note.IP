  <p class="home-actions">
    <a routerLink="/ip-lookup" role="button">{{ i18n.t('HOME.START_LOOKUP') }}</a>

    <a routerLink="/dashboard" role="button" class="outline">{{ i18n.t('NAV.DASHBOARD') }}</a>
    <a routerLink="/ip-notes" role="button" class="outline">{{ i18n.t('HOME.MY_NOTES') }}</a>
