name: ntk_note_ip_app
description: IP Note mobile client (Android/iOS)
publish_to: "none"
version: 0.1.2+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  go_router: ^14.8.1
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  network_info_plus: ^6.1.4
  device_info_plus: ^11.3.3
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  share_plus: ^10.1.4
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  json_annotation: ^4.12.0
  retrofit: ^4.9.2
  drift: ^2.28.1
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.39
  path: ^1.9.1
  path_provider: ^2.1.5
  workmanager: ^0.9.0
  flutter_local_notifications: ^19.0.0
  in_app_review: ^2.0.10
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.0
  package_info_plus: ^8.3.0
  flutter_native_splash: ^2.4.6
  home_widget: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  json_serializable: ^6.11.2
  retrofit_generator: ^10.2.0
  swagger_parser: ^1.43.1
  drift_dev: ^2.28.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/app_icon.png
  adaptive_icon_background: "#1A1625"
  adaptive_icon_foreground: assets/brand/app_icon.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/brand/app_icon.png
    background_color: "#1A1625"
    theme_color: "#7C3AED"
  windows:
    generate: true
    image_path: assets/brand/app_icon.png
    icon_size: 256

flutter_native_splash:
  color: "#1A1625"
  image: assets/brand/app_icon.png
  android_12:
    color: "#1A1625"
    image: assets/brand/app_icon.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/brand/
