name: Build

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '.scripts/**'
      - .gitignore
      - CODE_OF_CONDUCT.md
      - LICENSE
      - README.md

  workflow_call:
    inputs:
      build-artifacts:
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      name: Checkout code

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    #if (!UseApiOnly)
    - name: Install Node & cache npm packages
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: |
          src/Web/ClientApp/package-lock.json
          src/Web/ClientApp-React/package-lock.json
    #endif

    - name: Install .NET
      uses: actions/setup-dotnet@v5

    - name: Restore solution
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Install dotnet-ef
      run: dotnet tool install dotnet-ef --global

    - name: Verify EF migrations apply
      run: pwsh ./scripts/verify-migrations.ps1

    - name: Generate idempotent migration script
      run: pwsh ./scripts/migrate-idempotent.ps1

    - name: Upload migration script artifact
      uses: actions/upload-artifact@v5
      with:
        name: migrate-idempotent-sql
        path: artifacts/migrate-idempotent.sql
        retention-days: 14

    - name: Backend coverage gate
      run: pwsh ./scripts/coverage.ps1 -Configuration Release -SkipBuild -MinLinePercent 40
      
    #if (!UseApiOnly)
    - name: Install Playwright browsers
      run: pwsh artifacts/bin/Web.AcceptanceTests/release/playwright.ps1 install --with-deps chromium
    #endif

    - name: E2E tests
      run: dotnet test tests/Web.AcceptanceTests/Web.AcceptanceTests.csproj --no-build --configuration Release

    - name: Dependency audit (informational)
      continue-on-error: true
      run: pwsh ./scripts/security-audit.ps1

  gitleaks:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks scan (informational)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
