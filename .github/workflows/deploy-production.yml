name: Deploy production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'GHCR image tag (e.g. v1.2.3 or 1.2.3)'
        required: true
        type: string
      production_base_url:
        description: 'Public URL for smoke (optional; falls back to PRODUCTION_WEB_BASE_URL secret)'
        required: false
        type: string
        default: ''
      run_smoke:
        description: Run post-deploy smoke after approval
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    name: Approve and deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Image coordinates
        id: img
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ref="ghcr.io/${repo}/ipnote-web:${{ inputs.image_tag }}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          {
            echo "### Production deploy"
            echo ""
            echo "Image: \`${ref}\`"
            echo ""
            echo "On the production host (after backup / migration plan):"
            echo '```bash'
            echo "export IPNOTE_WEB_IMAGE=${ref}"
            echo "docker pull \"\$IPNOTE_WEB_IMAGE\""
            echo "docker compose -f docker-compose.prod.yml -f docker-compose.prod.registry.yml up -d"
            echo '```'
            echo ""
            echo "Rollback: [rollback.md](../docs/runbooks/rollback.md)"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke:
    needs: deploy
    if: inputs.run_smoke == true
    uses: ./.github/workflows/staging-smoke.yml
    with:
      web_base_url: ${{ inputs.production_base_url }}
      wait_seconds: '120'
      skip_k6: true
      skip_spa: false
      require_tls: true
    secrets:
      STAGING_WEB_BASE_URL: ${{ secrets.PRODUCTION_WEB_BASE_URL }}
