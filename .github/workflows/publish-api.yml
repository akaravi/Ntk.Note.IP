name: Publish API

on:
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: Push Docker image to GHCR (requires packages write)
        required: false
        type: boolean
        default: false
      run_staging_smoke:
        description: Run staging smoke after image scan (requires STAGING_WEB_BASE_URL or staging_base_url)
        required: false
        type: boolean
        default: false
      staging_base_url:
        description: Override staging URL for smoke (optional)
        required: false
        type: string
        default: ''
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: src/Web/ClientApp/package-lock.json

      - uses: actions/setup-dotnet@v5

      - name: Publish Web
        run: pwsh ./scripts/publish-api.ps1 -Configuration Release -OutputPath ./publish/web

      - name: Upload publish artifact
        uses: actions/upload-artifact@v5
        with:
          name: ipnote-web-publish
          path: publish/web
          retention-days: 30

      - name: Dependency audit (informational)
        continue-on-error: true
        run: pwsh ./scripts/security-audit.ps1

  docker:
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/ipnote-web
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase image name
        id: image
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository=${REGISTRY}/${repo}/ipnote-web" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        if: github.event_name == 'push' || inputs.push_to_registry == true
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=ci-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push_to_registry == true }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Resolve Trivy image ref
        id: trivyref
        run: |
          set -euo pipefail
          first="$(printf '%s\n' '${{ steps.meta.outputs.tags }}' | head -n1)"
          echo "ref=${first}" >> "$GITHUB_OUTPUT"
          echo "Scan target: ${first}"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ steps.trivyref.outputs.ref }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Publish image summary
        if: github.event_name == 'push' || inputs.push_to_registry == true
        run: |
          {
            echo "### Container image"
            echo ""
            echo "Tags: \`${{ steps.meta.outputs.tags }}\`"
            echo ""
            echo "Pull:"
            echo '```bash'
            echo "docker pull ${{ steps.image.outputs.repository }}:${{ github.ref_name }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  staging-smoke:
    needs: docker
    if: >-
      needs.docker.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.run_staging_smoke == true) ||
        (github.event_name == 'push' && secrets.STAGING_WEB_BASE_URL != '')
      )
    uses: ./.github/workflows/staging-smoke.yml
    with:
      web_base_url: ${{ github.event_name == 'workflow_dispatch' && inputs.staging_base_url || '' }}
      wait_seconds: '90'
      skip_k6: true
      skip_spa: false
      require_tls: true
    secrets:
      STAGING_WEB_BASE_URL: ${{ secrets.STAGING_WEB_BASE_URL }}
