name: Flutter Release Build

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Production API base URL
        required: false
        default: https://ipnote.ir
      target:
        description: Build target (appbundle | apk)
        required: false
        default: appbundle
  push:
    tags:
      - 'mobile-v*'

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Mobile/ntk_note_ip_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Decode Android keystore (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build release
        env:
          API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://ipnote.ir' }}
          TARGET: ${{ github.event.inputs.target || 'appbundle' }}
        run: |
          if [ "$TARGET" = "apk" ]; then
            flutter build apk --release --dart-define=API_BASE_URL="$API_BASE_URL"
          else
            flutter build appbundle --release --dart-define=API_BASE_URL="$API_BASE_URL"
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.sha }}
          path: |
            src/Mobile/ntk_note_ip_app/build/app/outputs/bundle/release/*.aab
            src/Mobile/ntk_note_ip_app/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: warn
